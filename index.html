<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU Student Portal</title>

    <link rel="stylesheet" href="style.css">

    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <h1>
            <i class="fa-solid fa-graduation-cap"></i>
            VTU Student Portal
        </h1>

        <p>Student Data Entry & Management System</p>

    </header>


    <section class="cards">

        <div class="card">
            <h2 id="totalStudents">0</h2>
            <span>Total Students</span>
        </div>

        <div class="card">
            <h2 id="cseStudents">0</h2>
            <span>CSE Students</span>
        </div>

        <div class="card">
            <h2 id="eceStudents">0</h2>
            <span>ECE Students</span>
        </div>

        <div class="card">
            <h2 id="iotStudents">0</h2>
            <span>CSE(IoT)</span>
        </div>

    </section>



    <section class="form-container">

        <h2>Student Registration</h2>

        <form id="studentForm">

            <input type="hidden" id="studentId">

            <div class="grid">

                <div>

                    <label>USN</label>

                    <input
                        type="text"
                        id="usn"
                        placeholder="1AC23CI001"
                        required>

                </div>

                <div>

                    <label>Student Name</label>

                    <input
                        type="text"
                        id="studentName"
                        placeholder="Enter Name"
                        required>

                </div>

                <div>

                    <label>Department</label>

                    <select id="department">

                        <option>CSE</option>

                        <option>CSE(IoT)</option>

                        <option>ISE</option>

                        <option>ECE</option>

                        <option>EEE</option>

                        <option>ME</option>

                    </select>

                </div>

                <div>

                    <label>Semester</label>

                    <select id="semester">

                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>

                    </select>

                </div>

                <div>

                    <label>Section</label>

                    <select id="section">

                        <option>A</option>

                        <option>B</option>

                        <option>C</option>

                    </select>

                </div>

                <div>

                    <label>Academic Year</label>

                    <input
                        type="text"
                        id="academicYear"
                        placeholder="2026-27"
                        required>

                </div>

                <div>

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="student@gmail.com"
                        required>

                </div>

                <div>

                    <label>Phone Number</label>

                    <input
                        type="text"
                        id="phone"
                        maxlength="10"
                        required>

                </div>

            </div>

            <div class="buttons">

                <button type="submit" id="saveBtn">

                    <i class="fa-solid fa-plus"></i>

                    Add Student

                </button>

                <button type="button" id="clearBtn">

                    <i class="fa-solid fa-eraser"></i>

                    Clear

                </button>

            </div>

        </form>

    </section>
        <section class="table-container">

        <div class="table-header">

            <h2>
                <i class="fa-solid fa-table"></i>
                Student Records
            </h2>

            <input
                type="text"
                id="search"
                placeholder="🔍 Search by USN or Name">

        </div>

        <table>

            <thead>

                <tr>

                    <th>USN</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Semester</th>
                    <th>Section</th>
                    <th>Academic Year</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
